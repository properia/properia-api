# Properia Nginx Reverse Proxy
# Strangler Fig migration: Java API takes routes progressively.
# To migrate a route, move it from the "Next.js" block to "Java API" block.

upstream nextjs {
    server properia-fe:3000;
    keepalive 32;
}

upstream javapi {
    server properia-api:8080;
    keepalive 32;
}

# Shared proxy headers
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Timeouts
    proxy_connect_timeout       10s;
    proxy_send_timeout          60s;
    proxy_read_timeout          60s;

    # Proxy headers (preserve client info through the reverse proxy)
    proxy_set_header Host               $host;
    proxy_set_header X-Real-IP          $remote_addr;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto  $scheme;
    proxy_http_version 1.1;

    # ── Actuator (Java — internal monitoring, not exposed publicly) ──────────
    # Restrict to internal network only
    location /actuator {
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        allow 127.0.0.1;
        deny all;
        proxy_pass http://javapi;
    }

    # ── OpenAPI / Swagger (Java) ─────────────────────────────────────────────
    location ~ ^/(api-docs|swagger-ui) {
        proxy_pass http://javapi;
    }

    # ═══════════════════════════════════════════════════════════════════════
    # SPRINT 0 — Only health is routed to Java.
    # Uncomment blocks as each sprint is completed.
    # ═══════════════════════════════════════════════════════════════════════

    # Sprint 0 ── Health
    location = /api/health {
        proxy_pass http://javapi;
    }

    # ── Sprint 1 ── Auth ✅
    location ~ ^/api/auth {
        proxy_pass http://javapi;
    }

    # ── Sprint 2 ── Listings ✅
    location ~ ^/api/listings {
        proxy_pass http://javapi;
    }
    location ~ ^/api/advertiser/listings {
        proxy_pass http://javapi;
    }

    # ── Sprint 3 ── Search + Geocoding + Locations + Commute ✅
    location ~ ^/api/search {
        proxy_pass http://javapi;
    }
    location ~ ^/api/geocoding {
        proxy_pass http://javapi;
    }
    location ~ ^/api/locations {
        proxy_pass http://javapi;
    }
    location ~ ^/api/commute {
        proxy_pass http://javapi;
    }

    # ── Sprint 4 ── CRM Core: Leads + Visitas ✅
    location ~ ^/api/advertiser/leads {
        proxy_pass http://javapi;
    }
    location ~ ^/api/advertiser/visitas {
        proxy_pass http://javapi;
    }
    location ~ ^/api/visitas {
        proxy_pass http://javapi;
    }
    location = /api/leads {
        proxy_pass http://javapi;
    }

    # ── Sprint 5 ── Chat + Notificações ✅
    location ~ ^/api/(advertiser/)?chat {
        proxy_pass http://javapi;
        proxy_read_timeout 3600s;
        proxy_buffering off;
        proxy_cache off;
    }
    location ~ ^/api/advertiser/notifications {
        proxy_pass http://javapi;
    }

    # ── Sprint 6 ── Billing + Stripe webhooks ✅
    location ~ ^/api/billing {
        proxy_pass http://javapi;
    }
    location ~ ^/api/webhooks {
        proxy_pass http://javapi;
    }
    location ~ ^/api/advertiser/billing {
        proxy_pass http://javapi;
    }
    location ~ ^/api/advertiser/plan {
        proxy_pass http://javapi;
    }

    # ── Sprint 7 ── Team + Buyers ✅
    location ~ ^/api/advertiser/team {
        proxy_pass http://javapi;
    }
    location ~ ^/api/advertiser/buyers {
        proxy_pass http://javapi;
    }

    # ── Sprint 8 ── Metrics + Pulse ✅
    location ~ ^/api/advertiser/metrics {
        proxy_pass http://javapi;
    }
    location ~ ^/api/advertiser/pulse {
        proxy_pass http://javapi;
    }
    location ~ ^/api/advertiser/listings/metrics {
        proxy_pass http://javapi;
    }

    # ── Sprint 9 ── CRM Import ✅
    location ~ ^/api/advertiser/crm {
        proxy_pass http://javapi;
    }

    # ── Sprint 10 ── Integrations ✅
    location ~ ^/api/advertiser/integrations {
        proxy_pass http://javapi;
    }

    # ── Sprint 11 ── Admin ✅
    location ~ ^/api/admin {
        proxy_pass http://javapi;
    }

    # ── Catch-all: remaining /api/advertiser → Java ✅
    location ~ ^/api/advertiser {
        proxy_pass http://javapi;
    }

    # ── Sprint 12 ── User data: favoritos, alertas, profile, custom profiles ✅
    location ~ ^/api/favoritos {
        proxy_pass http://javapi;
    }
    location ~ ^/api/alertas {
        proxy_pass http://javapi;
    }
    location ~ ^/api/profile {
        proxy_pass http://javapi;
    }
    location ~ ^/api/profiles {
        proxy_pass http://javapi;
    }

    # ── Sprint 12 ── Public endpoints ✅
    location ~ ^/api/public {
        proxy_pass http://javapi;
    }

    # ── Sprint 12 ── Team invite acceptance ✅
    location ~ ^/api/team {
        proxy_pass http://javapi;
    }

    # ── Sprint 12 ── Advertiser onboarding ✅
    location ~ ^/api/advertisers {
        proxy_pass http://javapi;
    }

    # ── Sprint 12 ── Media upload/confirm ✅
    location ~ ^/api/media {
        proxy_pass http://javapi;
    }

    # ── Sprint 12 ── Enrichment ✅
    location ~ ^/api/enrichment {
        proxy_pass http://javapi;
    }

    # ── Sprint 12 ── Privacy, partner-leads, decision-dossiers ✅
    location ~ ^/api/privacy {
        proxy_pass http://javapi;
    }
    location ~ ^/api/partner-leads {
        proxy_pass http://javapi;
    }
    location ~ ^/api/decision-dossiers {
        proxy_pass http://javapi;
    }

    # ════════════════════════════════════════════════════════════════════════
    # DEFAULT: All other traffic → Next.js frontend (pages only, no /api)
    # ════════════════════════════════════════════════════════════════════════
    location / {
        proxy_pass http://nextjs;
        # WebSocket support (Next.js HMR in dev)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
