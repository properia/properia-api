spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:${DATABASE_URL}}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 1
      connection-timeout: 30000
      initialization-fail-timeout: -1
      idle-timeout: 300000
      max-lifetime: 1200000
      pool-name: ProperiaHikari-Prod
      connection-init-sql: "SET statement_timeout = 0"

  jpa:
    show-sql: false

  flyway:
    baseline-on-migrate: false
    connect-retries: 10
    connect-retries-interval: 10s

server:
  error:
    include-message: never
    include-stacktrace: never

logging:
  level:
    pt.properia: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
    root: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# ── Swagger / OpenAPI — disabled in production ────────────────────────────────
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

# ── Actuator — restrict to health probe only in production ────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never        # Never leak DB / datasource details publicly

properia:
  jwt:
    cookie-secure: true         # Require HTTPS in production
  security:
    internal-api-secret: ${INTERNAL_API_SECRET:}   # Set in prod; blocks direct API access
  fal:
    api-key: ${FAL_API_KEY:}   # REQUIRED in production — set via env var